name: Daily BRAC Scraper

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours automatically
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  scrape_and_process:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to push the new JSON file back to the repo

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper and Gemini Processing
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: python main.py

    - name: Commit and Push Changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add bracu_data.json
        git commit -m "Auto-update BRACU data [skip ci]" || echo "No changes to commit"
        git push
